<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <title>Heat Index Checker</title>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="row box p-4 rounded-5">

        <div class="col-lg-8">

            <h3>Heat Index Checker</h3>

            <details ontoggle="showInstructions()">
                <summary>Instructions</summary>
                <p id="note"></p>
            </details>

            <form>

                <label>Temperature (°C)</label>
                <input type="number" id="temp" class="form-control mb-3" placeholder="Enter temperature">

                <label>Humidity (%)</label>
                <input type="number" id="humid" class="form-control mb-3" placeholder="Enter humidity">

                <button type="button" class="btn btn-danger" onclick="computeHeatIndex()">Check</button>

            </form>

        </div>

        <div class="col-lg-4 d-flex justify-content-center align-items-center">
            <img src="heat.png" class="img-fluid">
        </div>

    </div>

</div>

<!-- External JS -->
<script src="main.js"></script>

</body>
</html>
